<svg width="280" height="220" viewBox="0 0 280 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8A020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C47B10;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0600A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="140" cy="80" r="60" fill="none" stroke="url(#goldGrad)" stroke-width="1.4" />
  <!-- Inner dashed circle -->
  <circle cx="140" cy="80" r="53" fill="none" stroke="#C47B10" stroke-width="0.6" stroke-dasharray="2,4" />

  <!-- Coffee cup body -->
  <path d="M126 58 L130 100 L150 100 L154 58 Z" fill="url(#cupGrad)" />
  <!-- Cup lid -->
  <rect x="122" y="51" width="36" height="9" rx="4.5" fill="#F5C842" />
  <!-- Straw -->
  <rect x="143" y="36" width="5" height="21" rx="2.5" fill="#F5C842" />
  <!-- Star on cup -->
  <text x="140" y="84" text-anchor="middle" font-size="12" fill="#0A0A0A" font-weight="900" font-family="serif">✦</text>

  <!-- Decorative hearts and stars -->
  <text x="88"  y="65"  font-size="9"  fill="#E8A020" opacity="0.8" font-family="serif">♥</text>
  <text x="188" y="70"  font-size="9"  fill="#E8A020" opacity="0.8" font-family="serif">♥</text>
  <text x="94"  y="92"  font-size="8"  fill="#C47B10" opacity="0.7" font-family="serif">★</text>
  <text x="183" y="96"  font-size="8"  fill="#C47B10" opacity="0.7" font-family="serif">★</text>
  <text x="118" y="132" font-size="8"  fill="#E8A020" opacity="0.5" font-family="serif">★</text>
  <text x="157" y="134" font-size="8"  fill="#E8A020" opacity="0.5" font-family="serif">♥</text>

  <!-- Brand name -->
  <text x="140" y="158" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" letter-spacing="3.5" fill="url(#goldGrad)">COUNSELORS</text>
  <text x="140" y="180" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" letter-spacing="3.5" fill="url(#goldGrad)">CAFE</text>

  <!-- Tagline -->
  <text x="140" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="7.5" letter-spacing="2.8" fill="#C47B10">CAREER GUIDANCE &amp; MENTORSHIP</text>

  <!-- Thin decorative line -->
  <line x1="70" y1="204" x2="210" y2="204" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.5" />
</svg>
